name: Build Purplefinger GPU image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - chimera-lite/gpu-node/bootstrap.sh
      - chimera-lite/gpu-node/docker/**
      - .github/workflows/build-gpu-image.yml

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/purplefinger-gpu
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: ./chimera-lite/gpu-node
          file: ./chimera-lite/gpu-node/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max